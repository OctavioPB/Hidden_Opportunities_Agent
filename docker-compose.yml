version: "3.9"

services:
  agent:
    build: .
    container_name: hidden_opportunities_agent
    env_file:
      - .env
    ports:
      - "8501:8501"      # Streamlit UI
    volumes:
      # Persist database and generated data outside the container
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - DEMO_MODE=true
    restart: unless-stopped
